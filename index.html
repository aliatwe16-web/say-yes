<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mako, will you go to dinner with me? ❤️</title>

    <style>
        /* =====================================================
   ROMANTIC DINNER INVITATION
   Single-file HTML/CSS/JS
   ===================================================== */

        :root {
            --pink: #ff7eb6;
            --pink-light: #ffd7e9;
            --purple: #a855f7;
            --gold: #ffd166;
            --white: #ffffff;
            --dark: #5a4067;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #ffe7f3 0%, #fff 35%),
                radial-gradient(circle at bottom right, #efd9ff 0%, #fff 45%);
            color: var(--dark);
        }

        .container {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: min(90vw, 850px);
            text-align: center;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            padding: 40px;
            box-shadow:
                0 20px 50px rgba(168, 85, 247, .15),
                0 10px 30px rgba(255, 126, 182, .18);
            animation: fadeUp 1s ease;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1.15;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: .85;
        }

        .question-heart {
            font-size: 4rem;
            animation: pulse 2s infinite;
            margin-bottom: 15px;
        }

        .buttons {
            position: relative;
            width: 100%;
            height: 240px;
            margin-top: 10px;
        }

        .btn {
            border: none;
            cursor: pointer;
            font-size: 1.15rem;
            font-weight: 700;
            padding: 16px 34px;
            border-radius: 999px;
            transition: .3s ease;
            user-select: none;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
        }

        #yesBtn {
            background: linear-gradient(135deg, var(--pink), #ff4f9f);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 126, 182, .4);
        }

        #yesBtn:hover {
            box-shadow: 0 14px 35px rgba(255, 126, 182, .6);
        }

        #noBtn {
            position: absolute;
            left: 60%;
            top: 80px;
            background: linear-gradient(135deg, #c084fc, var(--purple));
            color: white;
            box-shadow: 0 10px 25px rgba(168, 85, 247, .35);
        }

        .message {
            margin-top: 25px;
            min-height: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #b45309;
        }

        .counter {
            margin-top: 20px;
            font-weight: 700;
            color: var(--purple);
        }

        .success {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 22px;
            background: linear-gradient(135deg, #fff7d6, #ffe8f3);
            animation: successPop .8s ease;
        }

        .success h2 {
            color: #ff4f9f;
            margin-bottom: 10px;
        }

        .music-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 20;
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        }

        .hearts {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: rgba(255, 126, 182, .5);
            animation: float linear forwards;
        }

        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            box-shadow:
                0 0 10px white,
                0 0 20px var(--gold),
                0 0 40px var(--gold);
        }

        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            to {
                transform: translateY(-120px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.12);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes successPop {
            0% {
                transform: scale(.7);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes wiggle {
            0% {
                transform: rotate(-8deg);
            }

            50% {
                transform: rotate(8deg);
            }

            100% {
                transform: rotate(0);
            }
        }

        @media (max-width:700px) {
            .card {
                padding: 28px;
            }

            .buttons {
                height: 280px;
            }

            #noBtn {
                left: 50%;
            }
        }
    </style>
</head>

<body>

    <button class="music-btn" id="musicToggle">🔊 Music</button>

    <div class="hearts" id="hearts"></div>

    <div class="container">
        <div class="card">

            <div class="question-heart">❤️</div>

            <h1>Mako, will you go to dinner with me? ❤️</h1>

            <p class="subtitle">
                I have a very important question...
            </p>

            <div class="buttons" id="buttonArea">
                <button class="btn" id="yesBtn">
                    Yes ❤️
                </button>

                <button class="btn" id="noBtn">
                    No 😅
                </button>
            </div>

            <div class="message" id="message"></div>

            <div class="counter" id="counter">
                No button escaped: 0 times
            </div>

            <div class="success" id="successBox">
                <h2>✨ Yay! ✨</h2>
                <p>
                    I can't wait to have dinner with you, Mako! ❤️
                </p>
            </div>

        </div>
    </div>

    <script>
        /* =====================================================
           FLOATING HEARTS
           ===================================================== */

        const heartsContainer = document.getElementById("hearts");

        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = ["❤️", "💖", "💕", "💗", "💘"][Math.floor(Math.random() * 5)];

            const size = Math.random() * 25 + 15;

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = size + "px";
            heart.style.animationDuration =
                (Math.random() * 8 + 8) + "s";

            heartsContainer.appendChild(heart);

            setTimeout(() => heart.remove(), 16000);
        }

        setInterval(createHeart, 350);

        /* =====================================================
           ESCAPING NO BUTTON
           ===================================================== */

        const noBtn = document.getElementById("noBtn");
        const area = document.getElementById("buttonArea");
        const message = document.getElementById("message");
        const counter = document.getElementById("counter");

        const funnyMessages = [
            "Are you sure? 😏",
            "Nice try! 😂",
            "Not so fast! ❤️",
            "Give it another thought! 🍝",
            "Dinner sounds good though! 😋",
            "You almost had me! 😆",
            "Try again! 😜",
            "The Yes button looks lonely! ❤️"
        ];

        let escapes = 0;
        let speedFactor = 1;

        function moveNoButton() {

            escapes++;
            counter.textContent =
                `No button escaped: ${escapes} times`;

            message.textContent =
                funnyMessages[
                Math.floor(Math.random() * funnyMessages.length)
                ];

            const areaRect = area.getBoundingClientRect();

            const maxX =
                areaRect.width - noBtn.offsetWidth - 10;

            const maxY =
                areaRect.height - noBtn.offsetHeight - 10;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            speedFactor += 0.08;

            noBtn.style.transition =
                `${Math.max(0.12, 0.4 / speedFactor)}s ease`;

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";

            if (Math.random() > 0.6) {
                noBtn.style.animation =
                    "wiggle .3s ease";
                setTimeout(() => {
                    noBtn.style.animation = "";
                }, 300);
            }

            if (Math.random() > 0.7) {
                noBtn.style.transform =
                    `rotate(${Math.random() * 40 - 20}deg)
             scale(${0.85 + Math.random() * 0.3})`;
            } else {
                noBtn.style.transform = "rotate(0) scale(1)";
            }
        }

        document.addEventListener("mousemove", (e) => {

            const rect = noBtn.getBoundingClientRect();

            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const distance = Math.hypot(
                e.clientX - centerX,
                e.clientY - centerY
            );

            const triggerDistance =
                Math.max(90, 180 - (escapes * 2));

            if (distance < triggerDistance) {
                moveNoButton();
            }
        });

        noBtn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            moveNoButton();
        });

        /* =====================================================
           YES BUTTON MAGIC CELEBRATION
           ===================================================== */

        const yesBtn = document.getElementById("yesBtn");
        const successBox =
            document.getElementById("successBox");

        yesBtn.addEventListener("click", () => {

            successBox.style.display = "block";

            document.body.style.transition =
                "background 1s ease";

            document.body.style.background =
                "radial-gradient(circle,#fff7db,#ffe0f0,#efe0ff)";

            launchCelebration();
        });

        function launchCelebration() {

            for (let i = 0; i < 180; i++) {

                const confetti =
                    document.createElement("div");

                confetti.className = "confetti";

                confetti.style.left =
                    window.innerWidth / 2 + "px";

                confetti.style.top =
                    window.innerHeight / 2 + "px";

                confetti.style.background =
                    ["#ff7eb6", "#ffd166",
                        "#a855f7", "#ffffff"][
                    Math.floor(Math.random() * 4)
                    ];

                document.body.appendChild(confetti);

                const angle =
                    Math.random() * Math.PI * 2;

                const distance =
                    Math.random() * 500 + 100;

                const x =
                    Math.cos(angle) * distance;

                const y =
                    Math.sin(angle) * distance;

                confetti.animate([
                    {
                        transform:
                            "translate(0,0) rotate(0deg)",
                        opacity: 1
                    },
                    {
                        transform:
                            `translate(${x}px,${y}px)
                 rotate(${Math.random() * 720}deg)`,
                        opacity: 0
                    }
                ], {
                    duration: 2500 + Math.random() * 1200,
                    easing: "cubic-bezier(.2,.8,.2,1)"
                });

                setTimeout(() => confetti.remove(), 4000);
            }

            for (let i = 0; i < 60; i++) {
                setTimeout(createSparkle, i * 50);
            }
        }

        function createSparkle() {

            const s = document.createElement("div");
            s.className = "sparkle";

            s.style.left =
                Math.random() * window.innerWidth + "px";

            s.style.top =
                Math.random() * window.innerHeight + "px";

            document.body.appendChild(s);

            s.animate([
                { transform: "scale(0)", opacity: 0 },
                { transform: "scale(1.5)", opacity: 1 },
                { transform: "scale(0)", opacity: 0 }
            ], {
                duration: 1200
            });

            setTimeout(() => s.remove(), 1300);
        }

        /* =====================================================
           OPTIONAL ROMANTIC MUSIC
           Uses Web Audio API generated tones
           ===================================================== */

        let audioContext;
        let oscillator;
        let gainNode;
        let playing = false;

        const musicBtn =
            document.getElementById("musicToggle");

        musicBtn.addEventListener("click", () => {

            if (!playing) {

                audioContext =
                    new (window.AudioContext ||
                        window.webkitAudioContext)();

                oscillator =
                    audioContext.createOscillator();

                gainNode =
                    audioContext.createGain();

                oscillator.type = "sine";
                oscillator.frequency.value = 261.63;

                gainNode.gain.value = 0.02;

                oscillator.connect(gainNode);
                gainNode.connect(
                    audioContext.destination
                );

                oscillator.start();

                playing = true;
                musicBtn.textContent = "🔇 Mute";

            } else {

                oscillator.stop();
                playing = false;
                musicBtn.textContent = "🔊 Music";
            }
        });
    </script>

</body>

</html>
